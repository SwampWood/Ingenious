version: '3.8'

services:
  backend:
    container_name: backend
    build:
      context: ./backend
    command: python -m gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend/staticfiles:/usr/src/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    container_name: frontend
    build:
      context: ./ingenious
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: serve -s /usr/src/app/build -l 3000

  nginx:
    container_name: nginx
    build:
      context: ./nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - static:/usr/src/app/static

volumes:
  static:
  postgres_data:
