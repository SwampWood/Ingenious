services:
  backend:
    container_name: backend
    build:
      context: ./backend
    volumes:
      - ./backend/db.sqlite3:/usr/src/app/db.sqlite3
      - ./backend/staticfiles:/usr/src/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    container_name: frontend
    build:
      context: ./ingenious
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: serve -s /usr/src/app/build -l 3000

  nginx:
    container_name: nginx
    build:
      context: ./nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - static:/usr/src/app/static

volumes:
  db_data:
  static:
